# ANIMA-bot Configuration
# Edit this file to customize your RAG system

llm:
  # Backend: "ollama", "llamacpp", or "openai"
  backend: "ollama"
  model: "qwen3.5:35b-a3b-coding-nvfp4"
  request_timeout: 360

  # Ollama-specific settings
  ollama:
    base_url: "http://localhost:11434"

  # llama.cpp-specific settings (used when backend: "llamacpp")
  llamacpp:
    model_path: "/mnt/c/llama.cpp/models/Qwen3.5-27B-Q4_K_M.gguf"
    n_ctx: 131072
    n_gpu_layers: -1  # -1 = use all available GPU layers

  # OpenAI-compatible API settings (used when backend: "openai")
  openai:
    api_base: null  # Set for local servers like LM Studio
    api_key: null   # Set via OPENAI_API_KEY env var if null

embeddings:
  provider: "BAAI"
  model: "bge-m3"
  local_path: "./models/bge-m3"

reranker:
  provider: "BAAI"
  model: "bge-reranker-v2-m3"
  local_path: "./models/bge-reranker-v2-m3"
  top_n: 5

retrieval:
  similarity_top_k: 10

storage:
  persist_dir: "./storage"
  data_dir: "./data"
