# ANIMA-bot Configuration
# Edit this file to customize your RAG system

llm:
  # Backend: "ollama", "llamacpp", or "openai"
  backend: "openai"
  request_timeout: 360

  # Ollama-specific settings
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3.1:8b"

  # llama.cpp-specific settings (used when backend: "llamacpp")
  # Can either load a local GGUF model OR connect to a llama-server instance
  llamacpp:
    base_url: null  # If set, connects to llama-server (e.g., "http://localhost:11434/v1")
    model_path: "/Users/nick/Development/ML/Models/llama.cpp/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
    model: "local"  # Model name for llama-server (ignored when using model_path)
    n_ctx: 32768
    n_gpu_layers: -1  # -1 = use all available GPU layers

  # OpenAI-compatible API settings (used when backend: "openai")
  # Supports: OpenAI, OpenRouter, LM Studio, vLLM, etc.
  # API key and base URL can also be set in .env file
  openai:
    model: "openrouter/free"  # Or use OPENAI_MODEL env var
    api_base: "https://openrouter.ai/api/v1"  # Examples: https://openrouter.ai/api/v1, http://localhost:1234/v1
    api_key: null   # Set via OPENAI_API_KEY in .env file (recommended)
    context_window: 32768  # Required for non-OpenAI providers (OpenRouter, LM Studio, etc.)

embeddings:
  provider: "BAAI"
  model: "bge-m3"
  local_path: "./models/bge-m3"

reranker:
  provider: "BAAI"
  model: "bge-reranker-v2-m3"
  local_path: "./models/bge-reranker-v2-m3"
  top_n: 5

retrieval:
  similarity_top_k: 25  # Increased for better reranking candidates
  hybrid_search: true   # Enable BM25 + Vector hybrid search
  hybrid_alpha: 0.5     # Balance: 0=BM25 only, 1=vector only, 0.5=balanced

chunking:
  chunk_size: 512
  chunk_overlap: 64
  splitting_method: "sentence"  # "sentence" or "semantic"

query:
  enable_hyde: false  # Hypothetical Document Embeddings for better retrieval
  hyde_prompt: "Write a detailed passage that would answer this question: {query}"

caching:
  enabled: true
  cache_dir: "./cache"

storage:
  persist_dir: "./storage"
  data_dir: "./data"
  index_version_file: "./storage/index_version.json"  # Track indexed documents
