# ANIMA-bot Configuration Example
# Copy this file to config.yaml and customize for your setup
#
# Supported LLM backends:
#   - ollama:   Local Ollama server (default)
#   - llamacpp: Direct llama.cpp integration via llama-cpp-python
#   - openai:   OpenAI API or compatible servers (LM Studio, vLLM, etc.)

llm:
  # Choose your backend
  backend: "ollama"

  # Model name (interpretation depends on backend)
  # - ollama: model name as shown in `ollama list`
  # - llamacpp: ignored, uses model_path instead
  # - openai: model name for API
  model: "llama3.1:8b"

  # Request timeout in seconds
  request_timeout: 360

  # --- Ollama Settings ---
  ollama:
    base_url: "http://localhost:11434"

  # --- llama.cpp Settings ---
  # Requires: pip install llama-index-llms-llama-cpp
  llamacpp:
    # Path to GGUF model file
    model_path: "./models/your-model.gguf"
    # Context window size
    n_ctx: 4096
    # GPU layers (-1 = all, 0 = CPU only)
    n_gpu_layers: -1

  # --- OpenAI-compatible Settings ---
  # Works with: OpenAI, LM Studio, vLLM, text-generation-inference
  # Requires: pip install llama-index-llms-openai
  openai:
    # Override API base URL (null = use OpenAI default)
    # Examples:
    #   LM Studio: "http://localhost:1234/v1"
    #   vLLM: "http://localhost:8000/v1"
    api_base: null
    # API key (or set OPENAI_API_KEY environment variable)
    api_key: null

# --- Embedding Model ---
embeddings:
  provider: "BAAI"
  model: "bge-m3"
  # Local path (falls back to HuggingFace download if not found)
  local_path: "./models/bge-m3"

# --- Reranker Model ---
reranker:
  provider: "BAAI"
  model: "bge-reranker-v2-m3"
  local_path: "./models/bge-reranker-v2-m3"
  # Number of documents to return after reranking
  top_n: 5

# --- Retrieval Settings ---
retrieval:
  # Number of documents to retrieve before reranking
  # Higher = better reranking candidates but slower
  similarity_top_k: 25

  # Enable hybrid search (BM25 + vector)
  # Improves keyword matching alongside semantic search
  hybrid_search: true

  # Balance between vector and BM25 search
  # 0 = BM25 only, 1 = vector only, 0.5 = balanced
  hybrid_alpha: 0.5

# --- Document Chunking ---
chunking:
  # Target chunk size in tokens
  chunk_size: 512
  # Overlap between chunks for context continuity
  chunk_overlap: 64
  # Splitting method: "sentence" or "semantic"
  # "semantic" uses embeddings to find natural breakpoints (slower)
  splitting_method: "sentence"

# --- Query Enhancement ---
query:
  # Enable HyDE (Hypothetical Document Embeddings)
  # Generates a hypothetical answer to improve retrieval
  enable_hyde: true
  # Prompt template for HyDE generation
  hyde_prompt: "Write a detailed passage that would answer this question: {query}"

# --- Caching ---
caching:
  # Enable disk-based query caching
  enabled: true
  # Cache directory
  cache_dir: "./cache"

# --- Storage Paths ---
storage:
  # Directory for vector index persistence
  persist_dir: "./storage"
  # Directory containing documents to index
  data_dir: "./data"
  # File tracking indexed document versions (for incremental updates)
  index_version_file: "./storage/index_version.json"
