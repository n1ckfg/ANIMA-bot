<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMA-bot</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #e0e0e0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #00d4ff;
            font-size: 2.5rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }
        .chat-container {
            background: #1e1e3a;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .query-section {
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #00d4ff;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #2a2a4a;
            border-radius: 8px;
            background: #12122a;
            color: #e0e0e0;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 15px;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #00b8e6;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        button.secondary {
            background: #2a2a4a;
            color: #e0e0e0;
            flex: 0 0 auto;
            padding: 15px 20px;
        }
        button.secondary:hover {
            background: #3a3a5a;
        }
        .options {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            cursor: pointer;
        }
        .options input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00d4ff;
        }
        .response-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #2a2a4a;
        }
        .response-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #00d4ff;
            font-weight: 600;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #888;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
        }
        .status-dot.loading {
            background: #ff9800;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .response-box {
            background: #12122a;
            border-radius: 8px;
            padding: 20px;
            min-height: 80px;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            color: #ff6b6b;
        }
        .example-queries {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        .example-queries strong {
            color: #00d4ff;
        }
        code {
            background: #2a2a4a;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #00d4ff;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ANIMA-bot</h1>
        <p class="subtitle">a RAG (Retrieval-Augmented Generation) system</p>

        <div class="chat-container">
            <div class="query-section">
                <label for="queryInput">Ask a question:</label>
                <textarea id="queryInput" placeholder="Type your query here..." autofocus></textarea>
                <div class="button-row">
                    <button id="queryButton" onclick="queryRAG()">Get Response</button>
                    <button class="secondary" onclick="queryRAGStream()">Stream</button>
                </div>
                <div class="options">
                    <label>
                        <input type="checkbox" id="useCache" checked>
                        Use cache
                    </label>
                    <label>
                        <input type="checkbox" id="useHyDE" checked disabled>
                        HyDE (server-side)
                    </label>
                </div>
                <div class="example-queries">
                    <strong>Try:</strong> <code>Summarize the overall theme of the collection</code> or <code>Discuss a topic on which three authors in the collection disagree</code>.
                </div>
            </div>

            <div class="response-section">
                <div class="response-header">
                    <span>Response:</span>
                    <div class="status-indicator" id="statusIndicator">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">Ready</span>
                    </div>
                </div>
                <div class="response-box" id="responseBox">
                    <p style="color: #666;">Your response will appear here...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const queryInput = document.getElementById('queryInput');
        const queryButton = document.getElementById('queryButton');
        const responseBox = document.getElementById('responseBox');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const useCache = document.getElementById('useCache');

        // Allow Enter key to submit (Shift+Enter for new line)
        queryInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                queryRAG();
            }
        });

        function setStatus(status, text) {
            statusDot.className = 'status-dot' + (status === 'loading' ? ' loading' : '');
            statusText.textContent = text;
        }

        async function queryRAG() {
            const query = queryInput.value.trim();
            if (!query) {
                alert('Please enter a query');
                return;
            }

            // Show loading state
            queryButton.disabled = true;
            queryButton.textContent = 'Searching...';
            responseBox.innerHTML = '<div class="loading"></div>';
            setStatus('loading', 'Processing...');

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: query,
                        use_cache: useCache.checked
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    responseBox.innerHTML = escapeHtml(data.response);
                    setStatus('ready', 'Complete');
                } else {
                    responseBox.innerHTML = `<span class="error">Error: ${escapeHtml(data.error)}</span>`;
                    setStatus('error', 'Error');
                }
            } catch (error) {
                responseBox.innerHTML = `<span class="error">Error: ${escapeHtml(error.message)}</span>`;
                setStatus('error', 'Error');
            } finally {
                queryButton.disabled = false;
                queryButton.textContent = 'Get Response';
            }
        }

        async function queryRAGStream() {
            const query = queryInput.value.trim();
            if (!query) {
                alert('Please enter a query');
                return;
            }

            // Show loading state
            queryButton.disabled = true;
            responseBox.innerHTML = '<span class="cursor"></span>';
            setStatus('loading', 'Streaming...');

            try {
                const response = await fetch('/query/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: query })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                setStatus('ready', 'Complete');
                            } else if (data.startsWith('[ERROR]')) {
                                responseBox.innerHTML = `<span class="error">${escapeHtml(data)}</span>`;
                                setStatus('error', 'Error');
                            } else {
                                fullResponse += data;
                                responseBox.innerHTML = escapeHtml(fullResponse) + '<span class="cursor"></span>';
                            }
                        }
                    }
                }

                // Remove cursor when done
                responseBox.innerHTML = escapeHtml(fullResponse);

            } catch (error) {
                responseBox.innerHTML = `<span class="error">Error: ${escapeHtml(error.message)}</span>`;
                setStatus('error', 'Error');
            } finally {
                queryButton.disabled = false;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Check health on load
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                if (data.status === 'healthy') {
                    setStatus('ready', 'Ready');
                } else {
                    setStatus('error', 'System unhealthy');
                }
            } catch (error) {
                setStatus('error', 'Cannot connect');
            }
        }

        checkHealth();
    </script>
</body>
</html>
